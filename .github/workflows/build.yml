name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build EXE
        run: |
          $p = python -c "import customtkinter,os; print(os.path.dirname(customtkinter.__file__))"
          pyinstaller --onefile --windowed --name FileListExtractor --add-data "${p};customtkinter" src/app.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileListExtractor-Windows
          path: dist/FileListExtractor.exe
          retention-days: 30